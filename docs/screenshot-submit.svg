<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 520" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Phone frame -->
  <rect width="380" height="520" rx="12" fill="#F4F6F8"/>

  <!-- Header -->
  <rect width="380" height="40" fill="#00375A"/>
  <text x="20" y="25" fill="rgba(255,255,255,0.5)" font-size="11" font-weight="500" letter-spacing="0.06em">TABSERVO</text>
  <rect y="40" width="380" height="3" fill="#FF5833"/>

  <!-- Card -->
  <rect x="16" y="56" width="348" height="448" rx="10" fill="white" stroke="#E2E6EA" stroke-width="1"/>

  <!-- Title -->
  <text x="36" y="82" fill="#00375A" font-size="15" font-weight="600">TabServo</text>
  <text x="36" y="98" fill="#6B7A8D" font-size="11">The 1st level Tableau AI Support Solution</text>
  <line x1="36" y1="110" x2="344" y2="110" stroke="#E2E6EA" stroke-width="1"/>

  <!-- Tableau Site -->
  <text x="36" y="130" fill="#00375A" font-size="10" font-weight="600" letter-spacing="0.5">TABLEAU SITE</text>
  <rect x="36" y="136" width="308" height="32" rx="6" fill="#FAFBFC" stroke="#E2E6EA" stroke-width="1.5"/>
  <text x="48" y="157" fill="#1A2B3C" font-size="13">timdriesdev</text>
  <text x="320" y="157" fill="#6B7A8D" font-size="10">v</text>

  <!-- Log to -->
  <text x="36" y="186" fill="#00375A" font-size="10" font-weight="600" letter-spacing="0.5">LOG TO</text>
  <rect x="36" y="192" width="308" height="32" rx="6" fill="#FAFBFC" stroke="#E2E6EA" stroke-width="1.5"/>
  <text x="48" y="213" fill="#1A2B3C" font-size="13">Jira Board</text>

  <!-- Title field -->
  <text x="36" y="242" fill="#00375A" font-size="10" font-weight="600" letter-spacing="0.5">TITLE</text>
  <rect x="36" y="248" width="308" height="32" rx="6" fill="#FAFBFC" stroke="#E2E6EA" stroke-width="1.5"/>
  <text x="48" y="269" fill="#1A2B3C" font-size="13">Change area charts to line charts</text>

  <!-- Category -->
  <text x="36" y="298" fill="#00375A" font-size="10" font-weight="600" letter-spacing="0.5">CATEGORY</text>
  <rect x="36" y="304" width="308" height="32" rx="6" fill="#FAFBFC" stroke="#E2E6EA" stroke-width="1.5"/>
  <text x="48" y="325" fill="#1A2B3C" font-size="13">Bug / Data discrepancy</text>

  <!-- Description -->
  <text x="36" y="354" fill="#00375A" font-size="10" font-weight="600" letter-spacing="0.5">DESCRIPTION</text>
  <rect x="36" y="360" width="308" height="52" rx="6" fill="#FAFBFC" stroke="#E2E6EA" stroke-width="1.5"/>
  <text x="48" y="381" fill="#1A2B3C" font-size="12">The Sales by Product and Sales by</text>
  <text x="48" y="397" fill="#1A2B3C" font-size="12">Segment charts should be line charts.</text>

  <!-- Workbook -->
  <text x="36" y="430" fill="#00375A" font-size="10" font-weight="600" letter-spacing="0.5">WORKBOOK NAME</text>
  <rect x="36" y="436" width="308" height="32" rx="6" fill="#FAFBFC" stroke="#E2E6EA" stroke-width="1.5"/>
  <text x="48" y="457" fill="#1A2B3C" font-size="13">Superstore with TabServo</text>

  <!-- Submit button -->
  <rect x="36" y="480" width="308" height="36" rx="6" fill="#FF5833"/>
  <text x="190" y="503" text-anchor="middle" fill="white" font-size="13" font-weight="600">Submit Issue</text>

  <!-- Phase label -->
  <rect x="280" y="4" width="90" height="22" rx="11" fill="rgba(255,88,51,0.2)"/>
  <text x="325" y="18" text-anchor="middle" fill="#FF5833" font-size="10" font-weight="600">STEP 1</text>
</svg>
