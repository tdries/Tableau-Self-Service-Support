<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="520" height="380" rx="10" fill="#F7F8FC"/>

  <!-- Jira header bar -->
  <rect width="520" height="44" rx="10 10 0 0" fill="white" stroke="#DFE1E6" stroke-width="1"/>
  <rect x="16" y="12" width="22" height="22" rx="4" fill="#0052CC"/>
  <text x="27" y="27" text-anchor="middle" fill="white" font-size="11" font-weight="700">J</text>
  <text x="46" y="22" fill="#0052CC" font-size="13" font-weight="500">BTSA-142</text>
  <text x="110" y="22" fill="#42526E" font-size="13">Change area charts to line charts</text>
  <!-- Status badge -->
  <rect x="430" y="12" width="72" height="22" rx="3" fill="#E3FCEF"/>
  <text x="466" y="27" text-anchor="middle" fill="#006644" font-size="10" font-weight="700">OPEN</text>

  <!-- Separator -->
  <line x1="0" y1="44" x2="520" y2="44" stroke="#DFE1E6" stroke-width="1"/>

  <!-- Description section -->
  <rect x="16" y="56" width="488" height="290" rx="8" fill="white" stroke="#DFE1E6" stroke-width="1"/>

  <!-- ADF content -->
  <text x="32" y="82" fill="#172B4D" font-size="13" font-weight="400">Dear support team,</text>

  <text x="32" y="110" fill="#172B4D" font-size="13">A new support request has been submitted via the</text>
  <text x="32" y="128" fill="#172B4D" font-size="13">TabServo Tableau extension.</text>

  <!-- Heading -->
  <text x="32" y="158" fill="#172B4D" font-size="15" font-weight="600">Issue Description</text>

  <text x="32" y="180" fill="#172B4D" font-size="13">The Sales by Product and Sales by Segment charts should</text>
  <text x="32" y="198" fill="#172B4D" font-size="13">be line charts, not area charts.</text>

  <!-- Details heading -->
  <text x="32" y="228" fill="#172B4D" font-size="15" font-weight="600">Details</text>

  <!-- Table -->
  <rect x="32" y="238" width="456" height="30" fill="#F4F5F7" stroke="#DFE1E6" stroke-width="1"/>
  <text x="44" y="258" fill="#6B778C" font-size="12" font-weight="500">Workbook</text>
  <line x1="140" y1="238" x2="140" y2="268" stroke="#DFE1E6" stroke-width="1"/>
  <text x="152" y="258" fill="#172B4D" font-size="12">Superstore with TabServo</text>

  <rect x="32" y="268" width="456" height="30" fill="white" stroke="#DFE1E6" stroke-width="1"/>
  <text x="44" y="288" fill="#6B778C" font-size="12" font-weight="500">Category</text>
  <line x1="140" y1="268" x2="140" y2="298" stroke="#DFE1E6" stroke-width="1"/>
  <text x="152" y="288" fill="#172B4D" font-size="12">bug</text>

  <!-- Separator line -->
  <line x1="32" y1="310" x2="488" y2="310" stroke="#DFE1E6" stroke-width="1"/>

  <!-- Italic note -->
  <text x="32" y="328" fill="#6B778C" font-size="11" font-style="italic">TabServo will now analyze the workbook and attempt an</text>
  <text x="32" y="343" fill="#6B778C" font-size="11" font-style="italic">automatic fix. Updates will follow on this ticket.</text>

  <!-- Phase label -->
  <rect x="410" y="56" width="90" height="20" rx="10" fill="rgba(0,82,204,0.1)"/>
  <text x="455" y="70" text-anchor="middle" fill="#0052CC" font-size="9" font-weight="600">TICKET CREATED</text>
</svg>
