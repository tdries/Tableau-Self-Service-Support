<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#006EFF"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#00696E"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8162FC"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#FF5833"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" rx="12" fill="#00243D"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="600" letter-spacing="-0.5">TabServo — System Architecture</text>
  <text x="480" y="54" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">AI-powered Tableau dashboard support by Biztory</text>

  <!-- Legend -->
  <rect x="640" y="22" width="8" height="3" rx="1" fill="#FF5833"/><text x="653" y="27" fill="rgba(255,255,255,0.5)" font-size="8">User</text>
  <rect x="690" y="22" width="8" height="3" rx="1" fill="#006EFF"/><text x="703" y="27" fill="rgba(255,255,255,0.5)" font-size="8">API</text>
  <rect x="730" y="22" width="8" height="3" rx="1" fill="#8162FC"/><text x="743" y="27" fill="rgba(255,255,255,0.5)" font-size="8">AI</text>
  <rect x="770" y="22" width="8" height="3" rx="1" fill="#00696E"/><text x="783" y="27" fill="rgba(255,255,255,0.5)" font-size="8">Data</text>

  <!-- Row 1: User Layer -->
  <text x="24" y="92" fill="rgba(255,255,255,0.25)" font-size="9" font-weight="600" letter-spacing="1.5" transform="rotate(-90 24 92)">USER</text>

  <rect x="50" y="70" width="200" height="70" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,88,51,0.3)" stroke-width="1"/>
  <rect x="58" y="78" width="28" height="28" rx="6" fill="rgba(255,88,51,0.15)"/>
  <text x="72" y="97" text-anchor="middle" fill="#FF5833" font-size="13" font-weight="700">T</text>
  <text x="96" y="92" fill="white" font-size="11" font-weight="500">Tableau Dashboard</text>
  <text x="96" y="106" fill="rgba(255,255,255,0.4)" font-size="9">Workbook on Tableau Cloud</text>
  <text x="60" y="128" fill="rgba(255,88,51,0.6)" font-size="8" font-weight="500">FRONTEND</text>

  <rect x="270" y="70" width="200" height="70" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,88,51,0.3)" stroke-width="1"/>
  <rect x="278" y="78" width="28" height="28" rx="6" fill="rgba(255,88,51,0.15)"/>
  <text x="292" y="97" text-anchor="middle" fill="#FF5833" font-size="13" font-weight="700">E</text>
  <text x="316" y="92" fill="white" font-size="11" font-weight="500">TabServo Extension</text>
  <text x="316" y="106" fill="rgba(255,255,255,0.4)" font-size="9">Issue form + SSE activity log</text>
  <text x="280" y="128" fill="rgba(255,88,51,0.6)" font-size="8" font-weight="500">ACCEPT / DECLINE</text>

  <!-- Arrow: User submits -->
  <line x1="250" y1="105" x2="268" y2="105" stroke="#FF5833" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Row 2: Application Layer -->
  <text x="24" y="212" fill="rgba(255,255,255,0.25)" font-size="9" font-weight="600" letter-spacing="1.5" transform="rotate(-90 24 212)">APP</text>

  <rect x="50" y="160" width="260" height="90" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(0,110,255,0.3)" stroke-width="1"/>
  <rect x="58" y="168" width="28" height="28" rx="6" fill="rgba(0,110,255,0.15)"/>
  <text x="72" y="187" text-anchor="middle" fill="#006EFF" font-size="13" font-weight="700">S</text>
  <text x="96" y="182" fill="white" font-size="11" font-weight="500">TabServo Server</text>
  <text x="96" y="196" fill="rgba(255,255,255,0.4)" font-size="9">Node.js on Railway</text>
  <text x="60" y="218" fill="rgba(255,255,255,0.3)" font-size="8">/api/submit-issue</text>
  <text x="60" y="230" fill="rgba(255,255,255,0.3)" font-size="8">/api/progress/:id (SSE)</text>
  <text x="60" y="242" fill="rgba(255,255,255,0.3)" font-size="8">/api/resolve  /api/restore</text>
  <text x="180" y="218" fill="rgba(255,255,255,0.3)" font-size="8">/api/log.xlsx</text>

  <rect x="330" y="160" width="200" height="90" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(0,110,255,0.3)" stroke-width="1"/>
  <rect x="338" y="168" width="28" height="28" rx="6" fill="rgba(0,110,255,0.15)"/>
  <text x="352" y="187" text-anchor="middle" fill="#006EFF" font-size="13" font-weight="700">A</text>
  <text x="376" y="182" fill="white" font-size="11" font-weight="500">TabServo Agent</text>
  <text x="376" y="196" fill="rgba(255,255,255,0.4)" font-size="9">Polls triggers, orchestrates AI</text>
  <text x="340" y="218" fill="rgba(255,255,255,0.3)" font-size="8">Two-pass analysis pipeline</text>
  <text x="340" y="230" fill="rgba(255,255,255,0.3)" font-size="8">Smart XML matching (3 layers)</text>
  <text x="340" y="242" fill="rgba(255,255,255,0.3)" font-size="8">XSD schema validation</text>

  <!-- Arrow: Extension to Server -->
  <line x1="370" y1="140" x2="250" y2="160" stroke="#006EFF" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="300" y="147" text-anchor="middle" fill="rgba(0,110,255,0.6)" font-size="7">POST</text>

  <!-- Arrow: Server SSE to Extension -->
  <line x1="180" y1="160" x2="320" y2="140" stroke="#00696E" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="240" y="145" text-anchor="middle" fill="rgba(0,105,110,0.6)" font-size="7">SSE events</text>

  <!-- Arrow: Server to Agent (queue) -->
  <line x1="310" y1="205" x2="328" y2="205" stroke="#00696E" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Row 3: AI Layer -->
  <text x="24" y="328" fill="rgba(255,255,255,0.25)" font-size="9" font-weight="600" letter-spacing="1.5" transform="rotate(-90 24 328)">AI</text>

  <rect x="50" y="270" width="155" height="80" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(129,98,252,0.3)" stroke-width="1"/>
  <rect x="58" y="278" width="28" height="28" rx="6" fill="rgba(129,98,252,0.15)"/>
  <text x="72" y="297" text-anchor="middle" fill="#8162FC" font-size="12" font-weight="700">1</text>
  <text x="96" y="292" fill="white" font-size="11" font-weight="500">Pass 1: Haiku</text>
  <text x="96" y="306" fill="rgba(255,255,255,0.4)" font-size="9">Target identification</text>
  <text x="60" y="328" fill="rgba(129,98,252,0.5)" font-size="8">~0.5s  |  ~1KB input</text>
  <text x="60" y="340" fill="rgba(255,255,255,0.3)" font-size="8">"Which sections do I need?"</text>

  <rect x="220" y="270" width="155" height="80" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(129,98,252,0.3)" stroke-width="1"/>
  <rect x="228" y="278" width="28" height="28" rx="6" fill="rgba(129,98,252,0.15)"/>
  <text x="242" y="297" text-anchor="middle" fill="#8162FC" font-size="12" font-weight="700">2</text>
  <text x="266" y="292" fill="white" font-size="11" font-weight="500">Pass 2: Opus</text>
  <text x="266" y="306" fill="rgba(255,255,255,0.4)" font-size="9">Full XML analysis + fix</text>
  <text x="230" y="328" fill="rgba(129,98,252,0.5)" font-size="8">~15s  |  10-50KB input</text>
  <text x="230" y="340" fill="rgba(255,255,255,0.3)" font-size="8">Generates fix operations JSON</text>

  <rect x="390" y="270" width="140" height="80" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(33,206,222,0.3)" stroke-width="1"/>
  <rect x="398" y="278" width="28" height="28" rx="6" fill="rgba(33,206,222,0.15)"/>
  <text x="412" y="297" text-anchor="middle" fill="#21CEDE" font-size="12" font-weight="700">V</text>
  <text x="436" y="292" fill="white" font-size="11" font-weight="500">XSD Validator</text>
  <text x="436" y="306" fill="rgba(255,255,255,0.4)" font-size="9">Tableau 2026.1 schema</text>
  <text x="400" y="328" fill="rgba(255,255,255,0.3)" font-size="8">Zone attrs, mark class,</text>
  <text x="400" y="340" fill="rgba(255,255,255,0.3)" font-size="8">datatypes, duplicate IDs</text>

  <!-- Arrows: Agent to AI -->
  <line x1="380" y1="250" x2="180" y2="270" stroke="#8162FC" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="400" y1="250" x2="300" y2="270" stroke="#8162FC" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="420" y1="250" x2="430" y2="270" stroke="#00696E" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Row 4: External Services -->
  <text x="24" y="432" fill="rgba(255,255,255,0.25)" font-size="9" font-weight="600" letter-spacing="1.5" transform="rotate(-90 24 432)">EXTERNAL</text>

  <rect x="50" y="370" width="170" height="80" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(0,110,255,0.3)" stroke-width="1"/>
  <rect x="58" y="378" width="28" height="28" rx="6" fill="rgba(0,110,255,0.15)"/>
  <text x="72" y="397" text-anchor="middle" fill="#006EFF" font-size="12" font-weight="700">J</text>
  <text x="96" y="392" fill="white" font-size="11" font-weight="500">Jira Cloud</text>
  <text x="96" y="406" fill="rgba(255,255,255,0.4)" font-size="9">Tickets + ADF comments</text>
  <text x="60" y="428" fill="rgba(255,255,255,0.3)" font-size="8">Auto-transitions on accept/decline</text>
  <text x="60" y="440" fill="rgba(255,255,255,0.3)" font-size="8">Professional "Dear X" comments</text>

  <rect x="235" y="370" width="170" height="80" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(0,105,110,0.3)" stroke-width="1"/>
  <rect x="243" y="378" width="28" height="28" rx="6" fill="rgba(0,105,110,0.15)"/>
  <text x="257" y="397" text-anchor="middle" fill="#64FA8C" font-size="10" font-weight="700">TC</text>
  <text x="281" y="392" fill="white" font-size="11" font-weight="500">Tableau Cloud API</text>
  <text x="281" y="406" fill="rgba(255,255,255,0.4)" font-size="9">Multi-site PAT auth</text>
  <text x="245" y="428" fill="rgba(255,255,255,0.3)" font-size="8">Download + publish .twbx</text>
  <text x="245" y="440" fill="rgba(255,255,255,0.3)" font-size="8">Restore backup on decline</text>

  <rect x="420" y="370" width="170" height="80" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(0,105,110,0.3)" stroke-width="1"/>
  <rect x="428" y="378" width="28" height="28" rx="6" fill="rgba(0,105,110,0.15)"/>
  <text x="442" y="397" text-anchor="middle" fill="#64FA8C" font-size="10" font-weight="700">DS</text>
  <text x="466" y="392" fill="white" font-size="11" font-weight="500">TabServo-log</text>
  <text x="466" y="406" fill="rgba(255,255,255,0.4)" font-size="9">Published datasource</text>
  <text x="430" y="428" fill="rgba(255,255,255,0.3)" font-size="8">Every request tracked</text>
  <text x="430" y="440" fill="rgba(255,255,255,0.3)" font-size="8">Persists across deploys</text>

  <!-- Arrows: Server/Agent to External -->
  <line x1="150" y1="250" x2="135" y2="370" stroke="#006EFF" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="128" y="310" fill="rgba(0,110,255,0.5)" font-size="7">Create ticket</text>
  <line x1="430" y1="250" x2="320" y2="370" stroke="#006EFF" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="388" y="310" fill="rgba(0,110,255,0.5)" font-size="7">Download/Publish</text>
  <line x1="250" y1="250" x2="500" y2="370" stroke="#00696E" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="395" y="305" fill="rgba(0,105,110,0.5)" font-size="7">Log datasource</text>

  <!-- Right side: Flow summary -->
  <rect x="600" y="70" width="340" height="400" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="620" y="94" fill="#64FA8C" font-size="10" font-weight="600" letter-spacing="1">REQUEST LIFECYCLE</text>

  <circle cx="625" cy="118" r="8" fill="rgba(255,88,51,0.2)"/><text x="625" y="121" text-anchor="middle" fill="#FF5833" font-size="8" font-weight="700">1</text>
  <text x="642" y="121" fill="white" font-size="10" font-weight="500">User submits issue in Tableau</text>

  <circle cx="625" cy="148" r="8" fill="rgba(0,110,255,0.2)"/><text x="625" y="151" text-anchor="middle" fill="#006EFF" font-size="8" font-weight="700">2</text>
  <text x="642" y="151" fill="white" font-size="10" font-weight="500">Jira ticket created (ADF formatted)</text>

  <circle cx="625" cy="178" r="8" fill="rgba(0,110,255,0.2)"/><text x="625" y="181" text-anchor="middle" fill="#006EFF" font-size="8" font-weight="700">3</text>
  <text x="642" y="181" fill="white" font-size="10" font-weight="500">Workbook downloaded from Cloud</text>

  <circle cx="625" cy="208" r="8" fill="rgba(129,98,252,0.2)"/><text x="625" y="211" text-anchor="middle" fill="#8162FC" font-size="8" font-weight="700">4</text>
  <text x="642" y="211" fill="white" font-size="10" font-weight="500">Pass 1: Identify target sections</text>

  <circle cx="625" cy="238" r="8" fill="rgba(129,98,252,0.2)"/><text x="625" y="241" text-anchor="middle" fill="#8162FC" font-size="8" font-weight="700">5</text>
  <text x="642" y="241" fill="white" font-size="10" font-weight="500">Pass 2: Full XML analysis + fix gen</text>

  <circle cx="625" cy="268" r="8" fill="rgba(33,206,222,0.2)"/><text x="625" y="271" text-anchor="middle" fill="#21CEDE" font-size="8" font-weight="700">6</text>
  <text x="642" y="271" fill="white" font-size="10" font-weight="500">XSD validation + smart matching</text>

  <circle cx="625" cy="298" r="8" fill="rgba(0,105,110,0.2)"/><text x="625" y="301" text-anchor="middle" fill="#64FA8C" font-size="8" font-weight="700">7</text>
  <text x="642" y="301" fill="white" font-size="10" font-weight="500">Fix applied + workbook republished</text>

  <circle cx="625" cy="328" r="8" fill="rgba(255,88,51,0.2)"/><text x="625" y="331" text-anchor="middle" fill="#FF5833" font-size="8" font-weight="700">8</text>
  <text x="642" y="331" fill="white" font-size="10" font-weight="500">User reviews: Accept or Decline</text>

  <circle cx="625" cy="358" r="8" fill="rgba(0,110,255,0.2)"/><text x="625" y="361" text-anchor="middle" fill="#006EFF" font-size="8" font-weight="700">9</text>
  <text x="642" y="361" fill="white" font-size="10" font-weight="500">Jira ticket closed or escalated</text>

  <circle cx="625" cy="388" r="8" fill="rgba(0,105,110,0.2)"/><text x="625" y="391" text-anchor="middle" fill="#64FA8C" font-size="8" font-weight="700">10</text>
  <text x="642" y="391" fill="white" font-size="10" font-weight="500">Request logged to TabServo-log DS</text>

  <!-- Connecting lines between steps -->
  <line x1="625" y1="126" x2="625" y2="140" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="625" y1="156" x2="625" y2="170" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="625" y1="186" x2="625" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="625" y1="216" x2="625" y2="230" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="625" y1="246" x2="625" y2="260" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="625" y1="276" x2="625" y2="290" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="625" y1="306" x2="625" y2="320" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="625" y1="336" x2="625" y2="350" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="625" y1="366" x2="625" y2="380" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Timing annotations -->
  <text x="920" y="151" text-anchor="end" fill="rgba(255,255,255,0.2)" font-size="8">~0.5s</text>
  <text x="920" y="181" text-anchor="end" fill="rgba(255,255,255,0.2)" font-size="8">~1s</text>
  <text x="920" y="211" text-anchor="end" fill="rgba(255,255,255,0.2)" font-size="8">~0.5s</text>
  <text x="920" y="241" text-anchor="end" fill="rgba(255,255,255,0.2)" font-size="8">~10-20s</text>
  <text x="920" y="271" text-anchor="end" fill="rgba(255,255,255,0.2)" font-size="8">~0.01s</text>
  <text x="920" y="301" text-anchor="end" fill="rgba(255,255,255,0.2)" font-size="8">~1s</text>

  <!-- Timing bracket -->
  <line x1="930" y1="130" x2="930" y2="310" stroke="rgba(100,250,140,0.3)" stroke-width="1"/>
  <text x="940" y="225" fill="rgba(100,250,140,0.5)" font-size="9" font-weight="500" transform="rotate(90 940 225)">~15-25s total</text>

  <!-- Footer -->
  <text x="480" y="500" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="9">TabServo by Biztory  |  biztory.com</text>
  <rect x="370" y="512" width="220" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="480" y="528" text-anchor="middle" fill="rgba(255,255,255,0.15)" font-size="8">Tableau Cloud  +  Jira  +  Claude AI  +  Node.js</text>
</svg>
