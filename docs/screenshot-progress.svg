<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 420" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="380" height="420" rx="12" fill="#F4F6F8"/>

  <!-- Header -->
  <rect width="380" height="40" fill="#00375A"/>
  <text x="20" y="25" fill="rgba(255,255,255,0.5)" font-size="11" font-weight="500" letter-spacing="0.06em">TABSERVO</text>
  <rect y="40" width="380" height="3" fill="#FF5833"/>

  <!-- Card -->
  <rect x="16" y="56" width="348" height="348" rx="10" fill="white" stroke="#E2E6EA" stroke-width="1"/>

  <!-- Success message -->
  <rect x="36" y="70" width="308" height="32" rx="6" fill="#E6FAF2" stroke="#64FA8C" stroke-width="0 0 0 3"/>
  <rect x="36" y="70" width="3" height="32" rx="1" fill="#64FA8C"/>
  <text x="50" y="91" fill="#00696E" font-size="12">Jira issue <tspan font-weight="600" fill="#006EFF">BTSA-142</tspan> created successfully.</text>

  <!-- Activity header -->
  <rect x="36" y="116" width="308" height="28" rx="6 6 0 0" fill="#00375A"/>
  <text x="48" y="135" fill="rgba(255,255,255,0.9)" font-size="10" font-weight="600" letter-spacing="0.5">AGENT ACTIVITY</text>
  <text x="320" y="135" fill="rgba(255,255,255,0.9)" font-size="10" font-weight="500">65%</text>

  <!-- Progress bar -->
  <rect x="36" y="144" width="308" height="3" fill="#E2E6EA"/>
  <rect x="36" y="144" width="200" height="3" fill="#FF5833"/>

  <!-- Log entries -->
  <rect x="36" y="147" width="308" height="240" fill="#FAFBFC" stroke="#E2E6EA" stroke-width="1" rx="0 0 6 6"/>

  <!-- Entry 1 -->
  <circle cx="52" cy="167" r="4" fill="#00696E"/>
  <text x="64" y="164" fill="#6B7A8D" font-size="9">10:45:02</text>
  <text x="120" y="164" fill="#1A2B3C" font-size="11">Issue BTSA-142 logged in Jira</text>
  <text x="320" y="164" fill="#6B7A8D" font-size="10">5%</text>
  <line x1="36" y1="177" x2="344" y2="177" stroke="#E2E6EA" stroke-width="0.5"/>

  <!-- Entry 2 -->
  <circle cx="52" cy="192" r="4" fill="#6B7A8D"/>
  <text x="64" y="189" fill="#6B7A8D" font-size="9">10:45:04</text>
  <text x="120" y="189" fill="#1A2B3C" font-size="11">Downloading workbook...</text>
  <text x="320" y="189" fill="#6B7A8D" font-size="10">22%</text>
  <line x1="36" y1="202" x2="344" y2="202" stroke="#E2E6EA" stroke-width="0.5"/>

  <!-- Entry 3 -->
  <circle cx="52" cy="217" r="4" fill="#6B7A8D"/>
  <text x="64" y="214" fill="#6B7A8D" font-size="9">10:45:05</text>
  <text x="120" y="214" fill="#1A2B3C" font-size="11">Scanning workbook structure...</text>
  <text x="320" y="214" fill="#6B7A8D" font-size="10">35%</text>
  <line x1="36" y1="227" x2="344" y2="227" stroke="#E2E6EA" stroke-width="0.5"/>

  <!-- Entry 4 -->
  <circle cx="52" cy="242" r="4" fill="#6B7A8D"/>
  <text x="64" y="239" fill="#6B7A8D" font-size="9">10:45:06</text>
  <text x="120" y="239" fill="#1A2B3C" font-size="11">Inspecting: Overview, Sales by Segment</text>
  <text x="320" y="239" fill="#6B7A8D" font-size="10">40%</text>
  <line x1="36" y1="252" x2="344" y2="252" stroke="#E2E6EA" stroke-width="0.5"/>

  <!-- Entry 5 -->
  <circle cx="52" cy="267" r="4" fill="#6B7A8D"/>
  <text x="64" y="264" fill="#6B7A8D" font-size="9">10:45:06</text>
  <text x="120" y="264" fill="#1A2B3C" font-size="11">Reading 24KB of workbook XML...</text>
  <text x="320" y="264" fill="#6B7A8D" font-size="10">45%</text>
  <line x1="36" y1="277" x2="344" y2="277" stroke="#E2E6EA" stroke-width="0.5"/>

  <!-- Entry 6 -->
  <circle cx="52" cy="292" r="4" fill="#6B7A8D"/>
  <text x="64" y="289" fill="#6B7A8D" font-size="9">10:45:07</text>
  <text x="120" y="289" fill="#1A2B3C" font-size="11">TabServo is diagnosing the issue...</text>
  <text x="320" y="289" fill="#6B7A8D" font-size="10">50%</text>
  <line x1="36" y1="302" x2="344" y2="302" stroke="#E2E6EA" stroke-width="0.5"/>

  <!-- Entry 7 -->
  <circle cx="52" cy="317" r="4" fill="#6B7A8D"/>
  <text x="64" y="314" fill="#6B7A8D" font-size="9">10:45:15</text>
  <text x="120" y="314" fill="#1A2B3C" font-size="11">Diagnosis: Area marks need to be Line</text>
  <text x="320" y="314" fill="#6B7A8D" font-size="10">60%</text>
  <line x1="36" y1="327" x2="344" y2="327" stroke="#E2E6EA" stroke-width="0.5"/>

  <!-- Entry 8 - active -->
  <circle cx="52" cy="342" r="4" fill="#FF5833">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="64" y="339" fill="#6B7A8D" font-size="9">10:45:16</text>
  <text x="120" y="339" fill="#1A2B3C" font-size="11" font-weight="500">Applying fix to workbook...</text>
  <text x="320" y="339" fill="#6B7A8D" font-size="10">65%</text>

  <!-- Phase label -->
  <rect x="274" y="4" width="96" height="22" rx="11" fill="rgba(129,98,252,0.2)"/>
  <text x="322" y="18" text-anchor="middle" fill="#8162FC" font-size="10" font-weight="600">STEP 2-4</text>
</svg>
